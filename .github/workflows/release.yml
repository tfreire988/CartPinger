name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-zip:
    name: Build plugin .zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies (no dev)
        run: composer install --prefer-dist --no-dev --no-progress --no-interaction --optimize-autoloader

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Build JS/CSS assets
        run: npm run build

      - name: Build distributable .zip
        run: bash bin/build-plugin-zip.sh

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: build-output/whatscom.zip
          generate_release_notes: true
